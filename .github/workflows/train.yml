name: Train ML Models

on:
  workflow_dispatch:
    inputs:
      script:
        description: Python script to run
        required: true
        type: string
      version:
        description: Version name for artifact
        required: true
        type: string

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install lightgbm xgboost catboost scikit-learn pandas numpy scipy kagglesdk requests

      - name: Download data
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: python scripts/download_data.py

      - name: Train
        run: python -u ${{ inputs.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: submissions-${{ inputs.version }}
          path: submissions/
          retention-days: 7
